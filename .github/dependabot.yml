# Dependabot configuration for automated dependency management.
# - Checks NuGet packages and GitHub Actions on a weekly basis
# - Creates version update pull requests to keep dependencies up to date
# - Enables grouped security update pull requests by ecosystem
# - Helps reduce maintenance effort and improve repository security

version: 2

updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "dotnet"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      nuget-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      nuget-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-version-updates:
        patterns:
          - "*"
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"